# Starship config вЂ” matches old custom prompt layout:
# [~/path] (branchв—Џ|вњ”)
# вћњ user at host $

format = '''
$directory $git_branch$git_status
$character$env_var[at ]()$hostname[\$]() '''

add_newline = true

[directory]
style = "bright-cyan"
truncation_length = 0
truncate_to_repo = false
format = '[\[$path\]]($style)'

[git_branch]
style = "bright-purple"
symbol = ""
format = '[\(](white)[$branch]($style)'

[git_status]
format = '[$staged$modified|$ahead_behind[\)](white) ]()'
staged = '[в—Џ](bright-yellow)'
modified = '[в—Џ](bright-red)'
ahead = '[в†‘${count}](bright-green)'
behind = '[в†“${count}](bright-red)'
diverged = '[в†‘${ahead_count}](bright-green)[/в†“${behind_count}](bright-red)'
up_to_date = '[вњ”](bright-green)'

[character]
success_symbol = '[вћњ](bold bright-green)'
error_symbol = '[вћњ](bold bright-red)'

[env_var]
variable = "USER"
style = "bright-purple"
format = '[$env_value]($style) '

[hostname]
ssh_only = false
style = "bright-yellow"
format = '[$hostname]($style) '
