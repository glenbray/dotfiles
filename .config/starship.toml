# Starship config — matches old custom prompt layout:
# [~/path] (branch●|✔)
# ➜ user at host $

format = '''
$directory $git_branch${custom.git_untracked}${custom.git_no_upstream}$git_status
$character$env_var[at ]()$hostname[\$]() '''

add_newline = true

[directory]
style = "bright-cyan"
truncation_length = 0
truncate_to_repo = false
format = '[\[$path\]]($style)'

[git_branch]
style = "bright-purple"
symbol = ""
format = '[\(](white)[$branch]($style)'

[git_status]
format = '[$staged$modified$ahead_behind$up_to_date[\)](white) ]()'
staged = '[●](bright-yellow)'
modified = '[●](bright-red)'
ahead = '[↑${count}](bright-green)'
behind = '[↓${count}](bright-red)'
diverged = '[↑${ahead_count}](bright-green)[/↓${behind_count}](bright-red)'
up_to_date = '[✔](bright-green)'

[custom.git_untracked]
command = 'echo "?"'
when = 'test -n "$(git ls-files --others --exclude-standard 2>/dev/null | head -1)"'
format = '[$output](bright-blue)'
description = 'Shows ? when there are untracked files (workaround for Starship worktree bug)'
shell = ['bash', '--noprofile', '--norc']

[custom.git_no_upstream]
command = 'echo "⊘"'
when = 'git rev-parse --git-dir >/dev/null 2>&1 && ! git rev-parse --abbrev-ref --symbolic-full-name @{u} >/dev/null 2>&1'
format = '[$output](bright-yellow)'
description = 'Shows ⊘ when current branch has no upstream tracking remote'
shell = ['bash', '--noprofile', '--norc']

[character]
success_symbol = '[➜](bold bright-green)'
error_symbol = '[➜](bold bright-red)'

[env_var]
variable = "USER"
style = "bright-purple"
format = '[$env_value]($style) '

[hostname]
ssh_only = false
style = "bright-yellow"
format = '[$hostname]($style) '
